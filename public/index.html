<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>API Blog</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #38bdf8;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            margin: 20px auto;
            width: 60%;
        }
        a {
            color: #22c55e;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <h1>🚀 SERVEUR API Blog Backend</h1>

    <div class="card">
        <p>Bienvenue sur mon API de gestion d’articles.</p>
        <p>Développée avec Node.js et Express.</p>
    </div>

    <div class="card">
        <h3>📌 Endpoints disponibles :</h3>
        <p>GET /api/articles</p>
        <p>POST /api/articles</p>
        <p>PUT /api/articles/:id</p>
        <p>DELETE /api/articles/:id</p>
        <p>GET /api/articles/search?query=mot</p>
    </div>

    <div class="card">
        <p>Testez l’API avec Postman 🚀</p>
    </div>

</body>
</html>
